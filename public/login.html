<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #ffcc70, #ff8177);
      font-family: Arial;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }
    input {
      margin: 10px;
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: #ff5e57;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <form action="/login" method="POST">
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
